<!DOCTYPE html>
<html>
<head>
    <title>Photo Studio App</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .container {
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: gray;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="title">📸 Photo Studio</div>
    <div class="subtitle">Create Passport Photos Easily</div>

    <h2>Register</h2>

    <form method="POST">
        <input name="username" placeholder="Enter Username" required>
        <input name="password" type="password" placeholder="Enter Password" required>
        <button>Register</button>
    </form>

    <a href="/login">Already have account? Login</a>
</div>

</body>
</html>
